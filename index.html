<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWA</title>
    <link rel="manifest" href="./manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      #map {
        height: 300px;
      }
    </style>

    <script src="./index.js" defer></script>
  </head>

  <body class="container my-4">
    <h1 class="mb-3">Mobilna aplikacja PWA</h1>

    <button class="btn btn-primary mb-3" onclick="startCamera()">
      Włącz kamerę
    </button>

    <button class="btn btn-success mb-3" onclick="takePhoto()">
      Zrób zdjęcie
    </button>

    <video id="video" autoplay playsinline class="w-100 mb-3"></video>
    <canvas id="canvas" hidden></canvas>
    <img id="photo" class="img-fluid mb-3" />

    <div id="map" class="mb-3"></div>

    <button class="btn btn-secondary" onclick="sharePhoto()">
      Udostępnij zdjęcie + lokalizację
    </button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
